apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collaro
  namespace: collaro
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - collaro.app
      secretName: collaro-tls
  rules:
    - host: collaro.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collaro
                port:
                  number: 80

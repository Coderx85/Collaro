apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: collaro

namespace: collaro

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - postgres.yaml
  - hpa.yaml
  - networkpolicy.yaml

images:
  - name: coderx85/collaro
    newTag: latest

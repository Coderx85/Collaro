apiVersion: v1
kind: ConfigMap
metadata:
  name: collaro-config
  namespace: collaro
  labels:
    app: collaro
    environment: production
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_APP_URL: "https://collaro.app"
  NEXT_PUBLIC_BETTER_AUTH_URL: "https://collaro.app"
  NEXT_PUBLIC_BASE_URL: "https://collaro.app"
  BETTER_AUTH_URL: "https://collaro.app"
  NEXT_TELEMETRY_DISABLED: "1"
  HOSTNAME: "0.0.0.0"
  PORT: "3000"

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: collaro
  namespace: collaro
spec:
  podSelector:
    matchLabels:
      app: collaro
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: collaro-db
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP

# Vector.dev configuration for collecting Docker container logs
# and forwarding them to Loki

[api]
enabled = true
address = "0.0.0.0:8686"

# Source: Docker container logs
[sources.docker_logs]
type = "docker_logs"
include_containers = ["collaro", "postgres", "loki", "grafana"]

# Transform: Parse and enrich logs
[transforms.parse_logs]
type = "remap"
inputs = ["docker_logs"]
source = '''
# Add timestamp if not present
.timestamp = now()

# Extract container name as a label
.labels.container = .container_name

# Map pino numeric levels to strings
pino_level_to_str = {10: "trace", 20: "debug", 30: "info", 40: "warn", 50: "error", 60: "fatal"}

# Try to parse JSON logs (pino outputs structured JSON)
parsed, err = parse_json(.message)
if err == null {
  .parsed = parsed

  # Handle pino level format (numeric or string)
  if exists(parsed.level) && is_integer(parsed.level) {
    .labels.level = pino_level_to_str[parsed.level] ?? "info"
  } else if exists(parsed.level) {
    .labels.level = parsed.level
  } else {
    .labels.level = "info"
  }

  # Extract pino msg as the log message
  if exists(parsed.msg) {
    .message = parsed.msg
  }
} else {
  .labels.level = "info"
}

# Set service label based on container name
.labels.service = .container_name ?? "unknown"
.labels.source = "vector"
'''

# Sink: Send to Loki
[sinks.loki]
type = "loki"
inputs = ["parse_logs"]
endpoint = "http://loki:3100"
encoding.codec = "json"

# Labels for Loki
labels.container = "{{ labels.container }}"
labels.level = "{{ labels.level }}"
labels.service = "{{ labels.service }}"
labels.source = "{{ labels.source }}"

# Healthcheck
healthcheck.enabled = true

# Buffer settings for reliability
buffer.type = "memory"
buffer.max_events = 1000

name: collaro

services:
  collaro-db:
    image: postgres:16.2
    container_name: collaro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collaro-network

  collaro-app:
    image: coderx85/collaro:latest
    container_name: collaro
    restart: unless-stopped
    build:
      context: ./core
      args:
        - DATABASE_URL=postgres://postgres:postgres@collaro-db:5432/postgres
        - NEXT_PUBLIC_APP_URL=http://localhost:3000
        - NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3000
    # Create core/.env.production for additional runtime secrets (SMTP, Resend, etc.)
    # env_file:
    #   - core/.env.production
    environment:
      - DATABASE_URL=postgres://postgres:postgres@collaro-db:5432/postgres
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - IMAGE_SERVICE_URL=http://image-service:3001
    ports:
      - "4000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      collaro-db:
        condition: service_healthy
      image-service:
        condition: service_started
    networks:
      - collaro-network

  image-service:
    build: ./image-service
    container_name: collaro-image-service
    ports:
      - "3001:3001"
    environment:
      RUST_ENV: dev
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # API_KEY: change-me   # uncomment to enable X-API-Key auth (empty = disabled)
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - collaro-network

  minio:
    image: minio/minio
    container_name: collaro-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - collaro-network

  minio-init:
    image: minio/mc
    container_name: collaro-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do
        echo 'waiting for minio...'
        sleep 2
      done &&
      mc mb local/collaro-images --ignore-existing &&
      echo 'bucket created'
      "
    networks:
      - collaro-network

volumes:
  postgres-data:
  minio_data:

networks:
  collaro-network:
    driver: bridge

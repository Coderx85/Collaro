services:
  collaro-db:
    image: postgres:16.2
    container_name: collaro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collaro-dev-network

volumes:
  postgres-data:

networks:
  collaro-dev-network:
    driver: bridge
